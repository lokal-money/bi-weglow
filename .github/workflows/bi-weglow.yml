name: Actualizar Dashboard

on:
  schedule:
    - cron: "0 * * * *"   # Cada hora
  workflow_dispatch:
  push:
    paths:
      - 'fetch_compago.py'
      - 'index.template.html'
      - 'mobile_template.html'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4.2.2

      - name: Configurar Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install urllib3

      - name: Generar dashboard desde Compago API
        env:
          COMPAGO_API_KEY: ${{ secrets.COMPAGO_API_KEY }}
        run: python3 fetch_compago.py "weGlow" "UTC-6" "${{ secrets.DASHBOARD_PASSWORD }}"

      - name: Commit actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html transactions.db
          test -f mobile.html && git add -f mobile.html || true
          git diff --cached --quiet || (git commit -m "Dashboard actualizado $(date +'%Y-%m-%d %H:%M UTC')" && git pull --rebase && git push)
