<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>weGlow · Lokal BI</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lokal BI"/>
<meta name="theme-color" content="#0b1120"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<style>
:root {
  --bg:      #0b1120;
  --surface: #111827;
  --card:    #1c2740;
  --border:  rgba(255,255,255,0.07);
  --teal:    #00c2a8;
  --teal2:   #00a88f;
  --red:     #f44747;
  --gold:    #f5a623;
  --text:    #e8edf5;
  --muted:   #7a8ba8;
  --nav-h:   60px;
  --safe-b:  env(safe-area-inset-bottom, 0px);
  --safe-t:  env(safe-area-inset-top,    0px);
}
*, *::before, *::after {
  box-sizing:border-box; margin:0; padding:0;
  -webkit-tap-highlight-color:transparent;
}
html, body {
  height:100%; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  font-size:14px; line-height:1.4;
  -webkit-font-smoothing:antialiased;
}

/* ── SHELL ─────────────────────────────────────────────────── */
.shell { display:flex; flex-direction:column; height:100vh; height:100dvh; }
.screen {
  display:none; flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 20px);
}
.screen.active { display:block; }

/* ── HEADER ────────────────────────────────────────────────── */
.header {
  flex-shrink:0; background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:calc(12px + var(--safe-t)) 16px 12px;
  display:flex; align-items:center; justify-content:space-between;
}
.header-merchant { font-size:17px; font-weight:700; letter-spacing:-.3px; }
.header-update   { font-size:10.5px; color:var(--muted); margin-top:1px; }
.header-logo {
  width:36px; height:36px; border-radius:10px; overflow:hidden;
  border:1px solid rgba(0,194,168,.3); flex-shrink:0;
}
.header-logo img { width:100%; height:100%; object-fit:cover; display:block; }

/* ── BRANCH BAR ─────────────────────────────────────────────── */
.branch-bar {
  flex-shrink:0;
  display:none;
  gap:7px;
  padding:8px 14px;
  overflow-x:auto;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.branch-bar::-webkit-scrollbar { display:none; }

/* ── NAV ───────────────────────────────────────────────────── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  height:calc(var(--nav-h) + var(--safe-b));
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; padding-bottom:var(--safe-b);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  background:none; border:none; cursor:pointer;
  color:var(--muted); font-size:10px; font-weight:500; transition:color .15s;
}
.nav-btn svg { width:22px; height:22px; }
.nav-btn.active { color:var(--teal); }

/* ── KPI CARDS ─────────────────────────────────────────────── */
.kpi-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px;
  margin:14px 14px 0;
}
.kpi-card.hero {
  background:linear-gradient(135deg,rgba(0,194,168,.15),rgba(0,168,143,.07));
  border-color:rgba(0,194,168,.25);
}
.kpi-3col {
  display:grid; grid-template-columns:1fr auto 1fr auto 1fr;
  align-items:center;
}
.kpi-col { padding:0 8px; }
.kpi-col:first-child { padding-left:0; }
.kpi-col:last-child  { padding-right:0; }
.kpi-vdiv { width:1px; height:44px; background:rgba(255,255,255,0.08); }
.kpi-label {
  font-size:10px; font-weight:600; text-transform:uppercase;
  letter-spacing:.7px; color:var(--muted); margin-bottom:5px;
}
.kpi-val {
  font-size:24px; font-weight:800; letter-spacing:-1px;
  color:var(--text); line-height:1;
}
.kpi-val.xl { font-size:30px; }
.kpi-val.sm { font-size:19px; }
.kpi-val.xs { font-size:16px; }
.week-header {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:14px;
}
.week-title  { font-size:12px; font-weight:600; color:var(--text); }
.week-period { font-size:10.5px; color:var(--muted); }
.delta {
  display:inline-flex; align-items:center; gap:2px;
  font-size:11px; font-weight:700;
  padding:2px 7px; border-radius:20px; margin-top:5px;
}
.delta.up   { background:rgba(0,194,168,.12);  color:var(--teal); }
.delta.down { background:rgba(244,71,71,.12);   color:var(--red);  }
.delta.flat { background:rgba(122,139,168,.1);  color:var(--muted); }

/* ── SECTIONS ──────────────────────────────────────────────── */
.sec { margin:16px 14px 0; }
.sec-title {
  font-size:10.5px; font-weight:600; text-transform:uppercase;
  letter-spacing:.8px; color:var(--muted);
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── CHARTS ────────────────────────────────────────────────── */
.chart-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px; overflow:hidden;
}
.chart-legend { display:flex; gap:14px; font-size:10.5px; color:var(--muted); margin-bottom:10px; }
.ldot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }
canvas { display:block; width:100% !important; }

/* ── FILTER CHIPS ───────────────────────────────────────────── */
.filter-row {
  display:flex; gap:7px; padding:12px 14px 4px;
  overflow-x:auto; scrollbar-width:none;
}
.filter-row::-webkit-scrollbar { display:none; }
.chip {
  background:transparent; border:1px solid var(--border);
  color:var(--muted); border-radius:20px;
  padding:5px 14px; font-size:12px; font-weight:500;
  cursor:pointer; white-space:nowrap; transition:all .15s;
  flex-shrink:0;
}
.chip.active {
  background:rgba(0,194,168,.12);
  border-color:rgba(0,194,168,.4); color:var(--teal);
}

/* ── TRANSACTIONS ───────────────────────────────────────────── */
.day-group { padding:0 14px; margin-top:14px; }
.day-hdr {
  font-size:11px; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:8px; display:flex; align-items:center; gap:8px;
}
.day-total { color:var(--teal); font-size:10.5px; font-weight:600; }
.txn-row {
  display:flex; align-items:center; gap:12px;
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:11px 13px; margin-bottom:6px;
}
.txn-time { font-size:12px; font-weight:600; color:var(--muted); min-width:38px; }
.txn-body { flex:1; min-width:0; }
.txn-amt  { font-size:15px; font-weight:700; letter-spacing:-.3px; }
.txn-amt.voided { color:var(--muted); text-decoration:line-through; }
.txn-meta { font-size:10.5px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.dot.ok  { background:var(--teal); }
.dot.bad { background:var(--red);  }
.dot.ref { background:var(--gold); }
.empty-state { display:flex; align-items:center; justify-content:center; min-height:160px; color:var(--muted); font-size:13px; }

/* ── LOGIN ─────────────────────────────────────────────────── */
#loginWrap {
  position:fixed; inset:0; z-index:9999; background:var(--bg);
  display:flex; align-items:center; justify-content:center; transition:opacity .3s;
}
#loginWrap.hidden { opacity:0; pointer-events:none; }
.login-box {
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:36px 28px; width:calc(100% - 48px); max-width:360px;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}
.login-logo { width:58px; height:58px; border-radius:14px; overflow:hidden; box-shadow:0 0 24px rgba(0,194,168,.3); }
.login-logo img { width:100%; height:100%; object-fit:cover; }
.login-title { font-size:18px; font-weight:700; text-align:center; }
.login-sub   { font-size:13px; color:var(--muted); text-align:center; margin-top:-12px; }
.login-inp {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:13px 16px; font-size:16px; color:var(--text);
  outline:none; transition:border-color .2s;
}
.login-inp:focus { border-color:rgba(0,194,168,.5); }
.login-btn {
  width:100%; background:linear-gradient(135deg,var(--teal),var(--teal2));
  border:none; border-radius:10px; padding:14px;
  font-size:15px; font-weight:700; color:#fff; cursor:pointer;
}
.login-err { font-size:12.5px; color:var(--red); display:none; text-align:center; }
.login-err.show { display:block; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo"><img src="icons/icon-192.png" alt="Lokal"/></div>
    <div>
      <div class="login-title">Lokal BI</div>
      <div class="login-sub">weGlow</div>
    </div>
    <div style="width:100%">
      <input class="login-inp" type="password" id="pwd"
             placeholder="Contrasena" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')auth()"/>
    </div>
    <div class="login-err" id="err">Contrasena incorrecta</div>
    <button class="login-btn" onclick="auth()">Ingresar</button>
  </div>
</div>

<!-- APP -->
<div class="shell" id="app" style="display:none">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-merchant">weGlow</div>
      <div class="header-update" id="updBadge">—</div>
    </div>
    <div class="header-logo">
      <img src="icons/icon-192.png" alt="Compago"/>
    </div>
  </div>

  <!-- BRANCH BAR (global — visible si hay mas de una sucursal) -->
  <div class="branch-bar" id="branchBar"></div>

  <!-- SCREEN: RESUMEN ─────────────────────────────────────── -->
  <div class="screen active" id="scrHome">

    <div class="kpi-card hero">
      <div class="kpi-label" style="margin-bottom:12px">Hoy</div>
      <div class="kpi-3col">
        <div class="kpi-col">
          <div class="kpi-label">Ventas</div>
          <div class="kpi-val xl" id="kV">$0</div>
        </div>
        <div class="kpi-vdiv"></div>
        <div class="kpi-col">
          <div class="kpi-label">Transacciones</div>
          <div class="kpi-val" id="kT">0</div>
        </div>
        <div class="kpi-vdiv"></div>
        <div class="kpi-col">
          <div class="kpi-label">Ticket medio</div>
          <div class="kpi-val sm" id="kTk">$0</div>
        </div>
      </div>
    </div>

    <div class="kpi-card" style="margin-top:10px">
      <div class="week-header">
        <div class="week-title">Semana acumulada</div>
        <div class="week-period" id="weekPeriod">—</div>
      </div>
      <div class="kpi-3col">
        <div class="kpi-col">
          <div class="kpi-label">Ventas</div>
          <div class="kpi-val sm" id="wV">$0</div>
          <div class="delta flat" id="wVDelta">—</div>
        </div>
        <div class="kpi-vdiv"></div>
        <div class="kpi-col">
          <div class="kpi-label">Transacciones</div>
          <div class="kpi-val xs" id="wT">0</div>
          <div class="delta flat" id="wTDelta">—</div>
        </div>
        <div class="kpi-vdiv"></div>
        <div class="kpi-col">
          <div class="kpi-label">Ticket</div>
          <div class="kpi-val xs" id="wTk">$0</div>
          <div class="delta flat" id="wTkDelta">—</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">7 dias vs semana anterior</div>
      <div class="chart-card">
        <div class="chart-legend">
          <span><span class="ldot" style="background:var(--teal)"></span>Esta semana</span>
          <span><span class="ldot" style="background:rgba(122,139,168,.45)"></span>Semana anterior</span>
        </div>
        <canvas id="cvWeek" height="140"></canvas>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Distribucion por hora (14 dias)</div>
      <div class="chart-card">
        <canvas id="cvHour" height="100"></canvas>
      </div>
    </div>

    <div style="height:8px"></div>
  </div>

  <!-- SCREEN: TRANSACCIONES ───────────────────────────────── -->
  <div class="screen" id="scrTxn">
    <!-- Filtro fecha -->
    <div class="filter-row">
      <button class="chip active" onclick="setFilter(0,this)">Hoy</button>
      <button class="chip"        onclick="setFilter(1,this)">Ayer</button>
      <button class="chip"        onclick="setFilter(7,this)">7 dias</button>
      <button class="chip"        onclick="setFilter(14,this)">14 dias</button>
    </div>
    <!-- Filtro sucursal (solo si hay mas de una) -->
    <div class="filter-row" id="branchFilterTxn" style="display:none; padding-top:0; padding-bottom:8px;"></div>
    <div id="txnList"></div>
  </div>

</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="nav('Home')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
    Resumen
  </button>
  <button class="nav-btn" id="navTxn" onclick="nav('Txn')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M7 8h10M7 12h7M7 16h4"/>
    </svg>
    Transacciones
  </button>
</nav>

<script>
// ════════════════════════════════════════════════════════════════
// DATOS — inyectados por fetch_compago.py
// Formato: [fecha, "HH:MM", bruto, neto, terminal, ref, estado, sucursal]
// estado: "C"=confirmado  "X"=cancelado  "R"=devolucion
// ════════════════════════════════════════════════════════════════
var MERCHANT  = "weGlow";
var GENERATED = "2026-07-14T09:03:55";
var PWD       = "WG#2026";
var TXN       = [];

// ── ESTADO GLOBAL ────────────────────────────────────────────────
var _selectedBranch = '';   // '' = todas las sucursales
var _filterDays     = 0;    // 0=hoy, 1=ayer, 7, 14

// ── AUTH ────────────────────────────────────────────────────────
function auth() {
  var v = document.getElementById('pwd').value;
  var e = document.getElementById('err');
  if(v === PWD) {
    sessionStorage.setItem('lkauth','1');
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    e.classList.add('show');
    setTimeout(function(){ e.classList.remove('show'); }, 2000);
  }
}
if(sessionStorage.getItem('lkauth') === '1') {
  document.getElementById('loginWrap').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  document.addEventListener('DOMContentLoaded', init);
}

// ── NAVEGACION ───────────────────────────────────────────────────
function nav(name) {
  var screens = document.querySelectorAll('.screen');
  for(var i=0; i<screens.length; i++) screens[i].classList.remove('active');
  var btns = document.querySelectorAll('.nav-btn');
  for(var j=0; j<btns.length; j++) btns[j].classList.remove('active');
  document.getElementById('scr'+name).classList.add('active');
  document.getElementById('nav'+name).classList.add('active');
  if(name === 'Txn') renderTxns(_filterDays);
}

// ── UTILS ────────────────────────────────────────────────────────
function fmt(n) {
  if(n >= 1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if(n >= 1000)    return '$'+(n/1000).toFixed(1)+'K';
  return '$'+n.toFixed(0);
}
function fmtFull(n) {
  return '$'+n.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function isoToday() {
  var d = new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function isoOffset(days) {
  var d = new Date();
  d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function dayLabel(iso) {
  return ['Do','Lu','Ma','Mi','Ju','Vi','Sa'][new Date(iso+'T12:00:00').getDay()];
}
function monthDay(iso) {
  var d = new Date(iso+'T12:00:00');
  return d.getDate()+' '+['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()];
}

// ── FILTRO DE DATOS (incluye sucursal) ───────────────────────────
function getConf() {
  return TXN.filter(function(r) {
    return r[6]==='C' && (_selectedBranch==='' || r[7]===_selectedBranch);
  });
}
function getAllFiltered() {
  return TXN.filter(function(r) {
    return _selectedBranch==='' || r[7]===_selectedBranch;
  });
}

function statsFor(dateStr) {
  var conf = getConf();
  var rows = conf.filter(function(r){ return r[0]===dateStr; });
  var gross = rows.reduce(function(s,r){ return s+r[2]; }, 0);
  return {gross:gross, count:rows.length, ticket:rows.length ? gross/rows.length : 0};
}
function statsForRange(from, to) {
  var conf = getConf();
  var rows = conf.filter(function(r){ return r[0]>=from && r[0]<=to; });
  var gross = rows.reduce(function(s,r){ return s+r[2]; }, 0);
  return {gross:gross, count:rows.length, ticket:rows.length ? gross/rows.length : 0};
}

function applyDelta(curr, prev, el) {
  if(!prev || prev===0) { el.textContent='—'; el.className='delta flat'; return; }
  var pct = ((curr-prev)/prev)*100;
  el.textContent = (pct>=0?'+':'')+pct.toFixed(1)+'%';
  el.className = 'delta '+(pct>0?'up':pct<0?'down':'flat');
}

// ── SEMANA ───────────────────────────────────────────────────────
function weekBounds() {
  var dow = new Date().getDay();
  var dFromMon = dow===0 ? 6 : dow-1;
  if(dFromMon===0) {
    return {
      from:isoOffset(-7), to:isoOffset(-1),
      prevFrom:isoOffset(-14), prevTo:isoOffset(-8),
      label:'Semana pasada '+monthDay(isoOffset(-7))+' - '+monthDay(isoOffset(-1))
    };
  }
  var from = isoOffset(-dFromMon);
  var to   = isoOffset(-1);
  return {
    from:from, to:to,
    prevFrom:isoOffset(-dFromMon-7), prevTo:isoOffset(-8),
    label:monthDay(from)+' - '+monthDay(to)
  };
}

// ── SUCURSALES ───────────────────────────────────────────────────
function getBranches() {
  var seen = {}, branches = [];
  for(var i=0; i<TXN.length; i++) {
    var b = TXN[i][7];
    if(b && b.length > 0 && !seen[b]) { seen[b]=true; branches.push(b); }
  }
  return branches.sort();
}

function buildBranchChips() {
  var branches = getBranches();
  var bar    = document.getElementById('branchBar');
  var barTxn = document.getElementById('branchFilterTxn');

  if(branches.length < 2) {
    if(bar)    bar.style.display='none';
    if(barTxn) barTxn.style.display='none';
    return;
  }

  var html = '<button class="chip active" onclick="setBranch(\'\',this)">Todas</button>';
  for(var i=0; i<branches.length; i++) {
    var b = branches[i];
    var safe = b.replace(/'/g,"\\'");
    html += '<button class="chip" onclick="setBranch(\''+safe+'\',this)">'+b+'</button>';
  }

  if(bar) {
    bar.innerHTML = html;
    bar.style.display = 'flex';
  }
  if(barTxn) {
    barTxn.innerHTML = html.replace(/onclick="setBranch\(/g, 'onclick="setBranchTxn(');
    barTxn.style.display = 'flex';
  }
}

function setBranch(branch, btn) {
  _selectedBranch = branch;
  // Actualizar chips en branch bar
  var chips = document.querySelectorAll('#branchBar .chip');
  for(var i=0; i<chips.length; i++) chips[i].classList.remove('active');
  btn.classList.add('active');
  // Sincronizar chips de txn
  syncBranchChips('branchFilterTxn', branch);
  refreshHome();
}

function setBranchTxn(branch, btn) {
  _selectedBranch = branch;
  var chips = document.querySelectorAll('#branchFilterTxn .chip');
  for(var i=0; i<chips.length; i++) chips[i].classList.remove('active');
  btn.classList.add('active');
  syncBranchChips('branchBar', branch);
  renderTxns(_filterDays);
}

function syncBranchChips(containerId, branch) {
  var container = document.getElementById(containerId);
  if(!container) return;
  var chips = container.querySelectorAll('.chip');
  for(var i=0; i<chips.length; i++) {
    chips[i].classList.remove('active');
  }
  // Activate the matching one
  for(var j=0; j<chips.length; j++) {
    var onclick = chips[j].getAttribute('onclick') || '';
    if(branch === '' && onclick.indexOf("''") !== -1) {
      chips[j].classList.add('active');
    } else if(branch !== '' && onclick.indexOf("'"+branch+"'") !== -1) {
      chips[j].classList.add('active');
    }
  }
}

// ── INIT ─────────────────────────────────────────────────────────

function refreshHome() {
  var today = isoToday();
  var sd = statsFor(today);

  document.getElementById('kV').textContent  = fmt(sd.gross);
  document.getElementById('kT').textContent  = sd.count;
  document.getElementById('kTk').textContent = fmtFull(sd.ticket);

  var wb = weekBounds();
  document.getElementById('weekPeriod').textContent = wb.label;

  var wCurr = statsForRange(wb.from, wb.to);
  var wPrev = statsForRange(wb.prevFrom, wb.prevTo);

  document.getElementById('wV').textContent  = fmt(wCurr.gross);
  document.getElementById('wT').textContent  = wCurr.count;
  document.getElementById('wTk').textContent = fmtFull(wCurr.ticket);

  applyDelta(wCurr.gross,  wPrev.gross,  document.getElementById('wVDelta'));
  applyDelta(wCurr.count,  wPrev.count,  document.getElementById('wTDelta'));
  applyDelta(wCurr.ticket, wPrev.ticket, document.getElementById('wTkDelta'));

  requestAnimationFrame(function(){ drawWeek(); drawHour(); });
}

// ── WEEK CHART ───────────────────────────────────────────────────
function drawWeek() {
  var cv = document.getElementById('cvWeek');
  if(!cv) return;
  var ctx = cv.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W = cv.parentElement.clientWidth - 28, H = 140;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.scale(dpr,dpr);

  var today = isoToday();
  var days = [];
  for(var i=6; i>=0; i--) {
    var cur  = isoOffset(-i);
    var prev = isoOffset(-i-7);
    days.push({
      lbl:dayLabel(cur),
      cur:statsFor(cur).gross,
      prev:statsFor(prev).gross,
      isToday:cur===today
    });
  }

  var maxVal = 1;
  for(var di=0; di<days.length; di++) {
    if(days[di].cur  > maxVal) maxVal = days[di].cur;
    if(days[di].prev > maxVal) maxVal = days[di].prev;
  }

  var pL=4, pR=4, pT=16, pB=22;
  var cW=W-pL-pR, cH=H-pT-pB;
  var slotW=cW/7, bW=slotW*0.28, gap=slotW*0.05;

  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(var gi=1; gi<=3; gi++) {
    var gy = pT + cH*(1-gi/3);
    ctx.beginPath(); ctx.moveTo(pL,gy); ctx.lineTo(W-pR,gy); ctx.stroke();
  }

  for(var di2=0; di2<days.length; di2++) {
    var d = days[di2];
    var cx = pL + slotW*di2 + slotW/2;

    if(d.prev > 0) {
      var bHp = (d.prev/maxVal)*cH;
      ctx.fillStyle = 'rgba(122,139,168,0.35)';
      rrect(ctx, cx-bW-gap, pT+cH-bHp, bW, bHp, 3); ctx.fill();
    }
    if(d.cur > 0) {
      var bHc = (d.cur/maxVal)*cH;
      ctx.fillStyle = d.isToday ? '#00c2a8' : 'rgba(0,194,168,0.65)';
      rrect(ctx, cx+gap, pT+cH-bHc, bW, bHc, 3); ctx.fill();
      if(bHc > 24) {
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = '500 9px system-ui'; ctx.textAlign = 'center';
        ctx.fillText(fmt(d.cur).replace('$',''), cx+gap+bW/2, pT+cH-bHc-4);
      }
    }
    ctx.fillStyle = d.isToday ? '#00c2a8' : 'rgba(122,139,168,0.8)';
    ctx.font = (d.isToday?'600 ':'500 ')+'10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(d.lbl, cx, H-5);
  }
}

// ── HOUR CHART ───────────────────────────────────────────────────
function drawHour() {
  var cv = document.getElementById('cvHour');
  if(!cv) return;
  var ctx = cv.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W = cv.parentElement.clientWidth - 28, H = 100;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.scale(dpr,dpr);

  var from = isoOffset(-13);
  var hourTotals = [];
  for(var hi=0; hi<24; hi++) hourTotals.push(0);

  var conf = getConf();
  conf.filter(function(r){ return r[0]>=from; }).forEach(function(r){
    var h = parseInt(r[1].split(':')[0], 10);
    if(h>=0 && h<24) hourTotals[h] += r[2];
  });

  var active = [];
  for(var ai=0; ai<24; ai++) {
    if(hourTotals[ai] > 0) active.push({hh:ai, vv:hourTotals[ai]});
  }

  if(!active.length) { ctx.clearRect(0,0,W,H); return; }

  var maxV = 0;
  for(var mi=0; mi<active.length; mi++) {
    if(active[mi].vv > maxV) maxV = active[mi].vv;
  }
  if(maxV===0) maxV = 1;

  var pL=2, pR=2, pT=6, pB=16;
  var cW=W-pL-pR, cH=H-pT-pB;
  var slotW2 = cW / active.length;
  var bW2 = Math.max(3, slotW2-2);

  ctx.clearRect(0,0,W,H);

  for(var bi=0; bi<active.length; bi++) {
    var x = active[bi];
    var barX = pL + slotW2*bi + (slotW2-bW2)/2;
    var bH = (x.vv/maxV)*cH;
    var t = x.vv/maxV;
    var gv = Math.round(130+t*64);
    var ga = (0.25+t*0.75);
    ctx.fillStyle = 'rgba(0,'+gv+',168,'+ga+')';
    if(bH > 1) { rrect(ctx, barX, pT+cH-bH, bW2, bH, 2); ctx.fill(); }
    ctx.fillStyle = 'rgba(122,139,168,0.8)';
    ctx.font = '9px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(x.hh+'h', barX+bW2/2, H-3);
  }
}

// ── LISTA DE TRANSACCIONES ───────────────────────────────────────
function setFilter(days, btn) {
  _filterDays = days;
  var chips = document.querySelectorAll('.filter-row:first-child .chip');
  for(var i=0; i<chips.length; i++) chips[i].classList.remove('active');
  btn.classList.add('active');
  renderTxns(days);
}

function renderTxns(days) {
  var list  = document.getElementById('txnList');
  var today = isoToday();
  var from  = days===0 ? today : days===1 ? isoOffset(-1) : isoOffset(-days+1);
  var to    = days===1 ? isoOffset(-1) : today;

  var rows = getAllFiltered()
    .filter(function(r){ return r[0]>=from && r[0]<=to; })
    .sort(function(a,b){
      if(b[0] < a[0]) return -1;
      if(b[0] > a[0]) return 1;
      if(b[1] < a[1]) return -1;
      return 1;
    });

  if(!rows.length) {
    list.innerHTML = '<div class="empty-state">Sin transacciones en este periodo</div>';
    return;
  }

  var byDate = {};
  for(var ri=0; ri<rows.length; ri++) {
    var r = rows[ri];
    if(!byDate[r[0]]) byDate[r[0]] = [];
    byDate[r[0]].push(r);
  }

  var dates = Object.keys(byDate).sort().reverse();
  var html  = '';

  for(var di=0; di<dates.length; di++) {
    var date   = dates[di];
    var dRows  = byDate[date];
    var conf   = dRows.filter(function(r){ return r[6]==='C'; });
    var dTotal = conf.reduce(function(s,r){ return s+r[2]; }, 0);

    html += '<div class="day-group">';
    html += '<div class="day-hdr">'+monthDay(date)+' &middot; '+dayLabel(date);
    html += '<span class="day-total">'+fmt(dTotal)+' &middot; '+conf.length+' conf.</span></div>';

    for(var ti=0; ti<dRows.length; ti++) {
      var row      = dRows[ti];
      var time     = row[1];
      var gross    = row[2];
      var terminal = row[4];
      var authRef  = row[5];
      var st       = row[6];
      var branch   = row[7];

      var cancelled = st==='X', refund = st==='R';
      var dot    = cancelled ? 'bad' : refund ? 'ref' : 'ok';
      var amtCls = cancelled ? ' voided' : '';
      var stTag  = cancelled ? '<span style="font-size:10px;color:var(--red);margin-left:4px">Cancelada</span>'
                 : refund    ? '<span style="font-size:10px;color:var(--gold);margin-left:4px">Devolucion</span>'
                 : '';
      var metaParts = [];
      if(terminal) metaParts.push('Term. '+terminal);
      if(branch)   metaParts.push(branch);
      if(authRef)  metaParts.push(authRef);

      html += '<div class="txn-row">';
      html += '<div class="txn-time">'+time+'</div>';
      html += '<div class="txn-body">';
      html += '<div class="txn-amt'+amtCls+'">'+fmtFull(gross)+stTag+'</div>';
      html += '<div class="txn-meta">'+metaParts.join(' &middot; ')+'</div>';
      html += '</div>';
      html += '<div class="dot '+dot+'"></div>';
      html += '</div>';
    }
    html += '</div>';
  }

  list.innerHTML = html;
}

// ── CANVAS UTIL ──────────────────────────────────────────────────
function rrect(ctx,x,y,w,h,r) {
  if(h<=0) return;
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}
